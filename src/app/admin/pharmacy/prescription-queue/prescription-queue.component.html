<section class="content">
  <div class="content-block">
    <div class="block-header">
      <app-breadcrumb [title]="'Prescription Queue'" [items]="['Pharmacy']" [active_item]="'Prescription Queue'"></app-breadcrumb>
    </div>

    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <app-master-table
          [dataSource]="dataSource"
          [columnDefinitions]="columnDefinitions"
          [title]="'Prescriptions Fulfillment Queue'"
          [showAdd]="false"
          [showEdit]="false"
          [showDelete]="false"
          [showDetails]="true"
          [disableRowClickToEdit]="true"
          [isLoading]="isLoading"
          (edit)="handleFulfill($event)"
          (delete)="handleCancel($event)"
          (details)="handleDetails($event)"
          (rowClick)="handleDetails($event)"
          (refresh)="handleRefresh()">
        </app-master-table>
      </div>
    </div>
  </div>
</section>
