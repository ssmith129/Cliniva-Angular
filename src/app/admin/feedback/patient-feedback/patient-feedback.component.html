<section class="content">
    <div class="content-block">
        <div class="block-header">
            <app-breadcrumb [title]="'Patient Feedback List'" [items]="['Feedback']"
                [active_item]="'Patient Feedback'"></app-breadcrumb>
        </div>
        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-12">
                <app-master-table [columnDefinitions]="columnDefinitions" [dataSource]="dataSource" [showAdd]="true"
                    [showRefresh]="true" [showExport]="true" [showDelete]="true" [isLoading]="isLoading"
                    (add)="handleAdd()" (edit)="handleEdit($event)" (delete)="handleDelete($event)"
                    (refresh)="handleRefresh()" [title]="'Patient Feedback List'"
                    (bulkDelete)="handleBulkDelete($event)">
                </app-master-table>
            </div>
        </div>
    </div>
</section>
