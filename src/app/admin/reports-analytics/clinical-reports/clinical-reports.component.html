<section class="content">
    <div class="content-block">
        <div class="block-header">
            <app-breadcrumb [title]="'Clinical Reports'" [items]="['Reports & Analytics']"
                [active_item]="'Clinical Reports'">
            </app-breadcrumb>
        </div>

        <div class="row clearfix">
            <div class="col-xl-8 col-lg-8 col-md-12 col-sm-12 mb-4">
                <div class="card h-100 mb-0">
                    <div class="header">
                        <h2>Patient Visit Trends</h2>
                    </div>
                    <div class="body">
                        <apx-chart [series]="visitTrendsOptions.series!" [chart]="visitTrendsOptions.chart!"
                            [xaxis]="visitTrendsOptions.xaxis!" [title]="visitTrendsOptions.title!"
                            [colors]="visitTrendsOptions.colors!" [dataLabels]="visitTrendsOptions.dataLabels!"
                            [stroke]="visitTrendsOptions.stroke!" [legend]="visitTrendsOptions.legend!"
                            [yaxis]="visitTrendsOptions.yaxis!"></apx-chart>
                    </div>
                </div>
            </div>
            <div class="col-xl-4 col-lg-4 col-md-12 col-sm-12 mb-4">
                <div class="card h-100 mb-0">
                    <div class="header">
                        <h2>Disease Distribution</h2>
                    </div>
                    <div class="body">
                        <apx-chart [series]="diseaseDistributionOptions.series!"
                            [chart]="diseaseDistributionOptions.chart!" [labels]="diseaseDistributionOptions.labels!"
                            [colors]="diseaseDistributionOptions.colors!" [legend]="diseaseDistributionOptions.legend!"
                            [responsive]="diseaseDistributionOptions.responsive!">
                        </apx-chart>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                <app-master-table [dataSource]="dataSource" [columnDefinitions]="columnDefinitions"
                    [title]="'Recent Clinical Reports'" [isLoading]="isLoading" (add)="handleAdd()"
                    (edit)="handleEdit($event)" (delete)="handleDelete($event)" (bulkDelete)="handleBulkDelete($event)"
                    (refresh)="handleRefresh()">
                </app-master-table>
            </div>
        </div>
    </div>
</section>
