<section class="content">
  <div class="content-block">
    <div class="block-header">
      <app-breadcrumb [title]="'Dietary Plans'" [items]="['Nutrition']" [active_item]="'Plans'"></app-breadcrumb>
    </div>

    <div class="row">
      <div class="col-12">
        <mat-card class="list-card">
          <mat-card-header class="d-flex justify-content-between align-items-center">
            <mat-card-title>Patient Diet Plans</mat-card-title>
            <button mat-raised-button color="primary" routerLink="/admin/diet-nutrition/nutritional-assessment">
              <mat-icon class="me-1">add</mat-icon> New Assessment
            </button>
          </mat-card-header>
          <mat-card-content class="pt-3">
            <div class="table-responsive">
              <table mat-table [dataSource]="dietPlans" class="w-100">
                <!-- Patient Column -->
                <ng-container matColumnDef="patient">
                  <th mat-header-cell *matHeaderCellDef>Patient</th>
                  <td mat-cell *matCellDef="let element">
                    <div class="patient-info-container">
                      <img [src]="element.avatar" class="table-img" alt="avatar" />
                      <div class="patient-info">
                        <div class="patient-name">{{ element.patientName }}</div>
                        <small class="text-muted">{{ element.patientId }}</small>
                      </div>
                    </div>
                  </td>
                </ng-container>

                <!-- Diet Type Column -->
                <ng-container matColumnDef="dietType">
                  <th mat-header-cell *matHeaderCellDef>Diet Type</th>
                  <td mat-cell *matCellDef="let element">{{ element.dietType }}</td>
                </ng-container>

                <!-- Calories Column -->
                <ng-container matColumnDef="calories">
                  <th mat-header-cell *matHeaderCellDef>Target Calories</th>
                  <td mat-cell *matCellDef="let element"><span class="calories-val">{{ element.dailyCalories }} kcal</span></td>
                </ng-container>

                <!-- Status Column -->
                <ng-container matColumnDef="status">
                  <th mat-header-cell *matHeaderCellDef>Status</th>
                  <td mat-cell *matCellDef="let element">
                    <span class="modern-badge" [ngClass]="getStatusClass(element.status)">
                      {{ element.status }}
                    </span>
                  </td>
                </ng-container>

                <!-- Last Updated Column -->
                <ng-container matColumnDef="lastUpdated">
                  <th mat-header-cell *matHeaderCellDef>Last Updated</th>
                  <td mat-cell *matCellDef="let element">{{ element.lastUpdated }}</td>
                </ng-container>

                <!-- Actions Column -->
                <ng-container matColumnDef="actions">
                  <th mat-header-cell *matHeaderCellDef>Actions</th>
                  <td mat-cell *matCellDef="let element">
                    <button mat-icon-button color="primary" [routerLink]="['/admin/diet-nutrition/nutritional-assessment']" [queryParams]="{ patient: element.patientName }" title="Run Assessment">
                      <mat-icon>assessment</mat-icon>
                    </button>
                  </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
              </table>
            </div>
          </mat-card-content>
        </mat-card>
      </div>
    </div>
  </div>
</section>
