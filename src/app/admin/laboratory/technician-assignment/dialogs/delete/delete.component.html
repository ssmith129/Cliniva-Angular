<div class="container">
    <h3 mat-dialog-title>Are you sure?</h3>
    <div mat-dialog-content>
        <ul class="clearfix">
            <li>
                <p><span class="font-weight-bold"> Assignment ID: </span>{{data.assignmentId}}</p>
            </li>
            <li>
                <p><span class="font-weight-bold"> Technician: </span>{{data.technicianName}}</p>
            </li>
        </ul>
        <p>This action cannot be undone.</p>
    </div>
    <div mat-dialog-actions class="mb-1">
        <button mat-flat-button class="formCancelBtn" (click)="confirmDelete()">
            Delete
        </button>
        <button mat-flat-button mat-dialog-close color="accent" tabindex="-1">Cancel</button>
    </div>
</div>
