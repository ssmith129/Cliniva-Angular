<section class="content">
    <div class="content-block">
        <div class="block-header">
            <app-breadcrumb [title]="'Lab Reports'" [items]="['Laboratory']"
                [active_item]="'Lab Reports'"></app-breadcrumb>
        </div>
        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                <app-master-table [dataSource]="dataSource" [columnDefinitions]="columnDefinitions"
                    [isLoading]="isLoading" (add)="handleAdd()" (edit)="handleEdit($event)"
                    (delete)="handleDelete($event)" (refresh)="handleRefresh()" [title]="'Lab Reports'"
                    [showAdd]="true" [showRefresh]="true" [showExport]="true">
                </app-master-table>
            </div>
        </div>
    </div>
</section>
