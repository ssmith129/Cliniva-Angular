<section class="content">
  <div class="content-block">
    <div class="block-header">
      <app-breadcrumb [title]="'Users & Roles Settings'" [items]="['Settings']" [active_item]="'Users & Roles'">
      </app-breadcrumb>
    </div>
    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <app-master-table [dataSource]="dataSource" [columnDefinitions]="columnDefinitions"
          [title]="'Users & Roles Management'" [isLoading]="isLoading" (add)="handleAdd()" (edit)="handleEdit($event)"
          (delete)="handleDelete($event)" (bulkDelete)="handleBulkDelete($event)" (refresh)="handleRefresh()">
        </app-master-table>
      </div>
    </div>
  </div>
</section>
