<section class="content">
  <div class="content-block">
    <div class="block-header">
      <app-breadcrumb [title]="'Physiotherapy Sessions'" [items]="['Rehab']" [active_item]="'Sessions'"></app-breadcrumb>
    </div>

    <div class="row">
      <div class="col-12">
        <mat-card class="list-card">
          <mat-card-header class="d-flex justify-content-between align-items-center">
            <mat-card-title>Therapy Appointment Logs</mat-card-title>
            <button mat-raised-button color="primary" routerLink="/admin/physiotherapy/progress-notes">
              <mat-icon class="me-1">add_task</mat-icon> Log Progress
            </button>
          </mat-card-header>
          <mat-card-content class="pt-3">
            <div class="table-responsive">
              <table mat-table [dataSource]="sessions" class="w-100">
                <!-- Patient Column -->
                <ng-container matColumnDef="patient">
                  <th mat-header-cell *matHeaderCellDef>Patient</th>
                  <td mat-cell *matCellDef="let element">
                    <div class="patient-info-container">
                      <img [src]="element.avatar" class="table-img" alt="avatar" />
                      <div class="patient-info">
                        <div class="patient-name">{{ element.patientName }}</div>
                        <small class="text-muted">{{ element.patientId }}</small>
                      </div>
                    </div>
                  </td>
                </ng-container>

                <!-- Therapist Column -->
                <ng-container matColumnDef="therapist">
                  <th mat-header-cell *matHeaderCellDef>Therapist</th>
                  <td mat-cell *matCellDef="let element">{{ element.therapist }}</td>
                </ng-container>

                <!-- Therapy Column -->
                <ng-container matColumnDef="therapy">
                  <th mat-header-cell *matHeaderCellDef>Therapy Type</th>
                  <td mat-cell *matCellDef="let element">{{ element.therapyType }}</td>
                </ng-container>

                <!-- Time Column -->
                <ng-container matColumnDef="timeSlot">
                  <th mat-header-cell *matHeaderCellDef>Scheduled Time</th>
                  <td mat-cell *matCellDef="let element"><span class="time-val">{{ element.timeSlot }}</span></td>
                </ng-container>

                <!-- Status Column -->
                <ng-container matColumnDef="status">
                  <th mat-header-cell *matHeaderCellDef>Status</th>
                  <td mat-cell *matCellDef="let element">
                    <span class="modern-badge" [ngClass]="getStatusClass(element.status)">
                      {{ element.status }}
                    </span>
                  </td>
                </ng-container>

                <!-- Actions Column -->
                <ng-container matColumnDef="actions">
                  <th mat-header-cell *matHeaderCellDef>Actions</th>
                  <td mat-cell *matCellDef="let element">
                    <button mat-icon-button color="primary" [routerLink]="['/admin/physiotherapy/progress-notes']" [queryParams]="{ patient: element.patientName }" title="Write Session Progress">
                      <mat-icon>rate_review</mat-icon>
                    </button>
                  </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
              </table>
            </div>
          </mat-card-content>
        </mat-card>
      </div>
    </div>
  </div>
</section>
