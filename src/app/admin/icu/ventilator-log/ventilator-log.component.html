<section class="content">
  <div class="content-block">
    <div class="block-header">
      <app-breadcrumb [title]="'Ventilator Logs'" [items]="['ICU']" [active_item]="'Ventilators'"></app-breadcrumb>
    </div>

    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <app-master-table 
          [title]="'Active Ventilator Status'"
          [dataSource]="dataSource"
          [columnDefinitions]="columns"
          [isLoading]="isLoading"
          [showCheckbox]="true"
          [showEdit]="true"
          [showDelete]="false"
          [showAdd]="true">
        </app-master-table>
      </div>
    </div>
  </div>
</section>
