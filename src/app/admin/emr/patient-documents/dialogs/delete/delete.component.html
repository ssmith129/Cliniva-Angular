<h1 mat-dialog-title>Confirm Delete</h1>
<div mat-dialog-content>
  <p>Are you sure you want to delete the document for <strong>{{ data.patientName }}</strong>?</p>
  <p class="text-muted">Document ID: {{ data.docId }}</p>
</div>
<div mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="warn" (click)="onConfirm()">Delete</button>
</div>
