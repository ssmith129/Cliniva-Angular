<section class="content">
    <div class="content-block">
        <div class="block-header">
            <app-breadcrumb [title]="breadscrums[0].title" [items]="breadscrums[0].items"
                [active_item]="breadscrums[0].active"></app-breadcrumb>
        </div>
        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-12">
                <app-master-table [dataSource]="dataSource" [columnDefinitions]="columnDefinitions"
                    [isLoading]="isLoading" (add)="handleAdd()" (edit)="handleEdit($event)"
                    (delete)="handleDelete($event)" (refresh)="handleRefresh()" [title]="'Patient Document'"
                    [showAdd]="true" [showRefresh]="true" [showExport]="true">
                </app-master-table>
            </div>
        </div>
    </div>
</section>
