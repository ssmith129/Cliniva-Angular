<div class="auth-container modern-auth position-relative overflow-hidden">
  <!-- Dynamic Animated Background -->
  <div class="bg-layer">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="auth-form-section w-100 h-100 d-flex justify-content-center align-items-center px-3 position-relative z-index-10">
    <div class="premium-glass-card">
      <div class="card-content text-center">
        <!-- Animated Icon -->
        <div class="auth-icon-wrapper mb-4">
          <div class="icon-circle animated-pulse">
            <mat-icon class="maintenance-icon">build</mat-icon>
          </div>
        </div>

        <h2 class="auth-title mb-3">Under Maintenance</h2>
        <p class="auth-subtitle text-muted mb-5">
          We are currently undergoing scheduled maintenance to improve our services.<br/>
          We will be back online shortly. Thank you for your patience!
        </p>

        <div class="container-auth-form-btn mt-4 d-flex justify-content-center">
          <button mat-flat-button color="primary" class="premium-auth-btn px-5" routerLink="/admin/dashboard/main">
            <mat-icon class="me-2">home</mat-icon>
            <span>Back to Home</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
