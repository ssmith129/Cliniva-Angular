<div class="card welcome-card border-0 mb-4">
  <div class="card-body p-4 p-lg-5">
    <div class="row align-items-center position-relative z-1">
      <div class="col-xl-8 col-lg-7 col-md-12">
        <div class="d-flex align-items-center mb-2">
          <div class="badge bg-primary text-white rounded-pill px-3 py-2 me-3">Good Morning</div>
          <p class="mb-0 text-muted fw-medium">Welcome back!</p>
        </div>
        <h2 class="fw-bold display-6 mb-1 text-dark">Dr. Sarah Smith</h2>
        <p class="text-secondary mb-4 fs-6">Gynecologist, MBBS, MD</p>

      </div>
      <div class="col-xl-4 col-lg-5 text-end d-none d-lg-block">
        <img src="assets/images/pages/doctors.svg" alt="Doctor" class="img-fluid banner-img">
      </div>
    </div>

    <div class="row position-relative z-1">
      <div class="col-12">
        <div class="d-flex flex-nowrap gap-2 mt-4 w-100">
          <div class="stat-card flex-fill">
            <div class="stat-icon bg-primary bg-opacity-10 text-primary"><mat-icon>schedule</mat-icon></div>
            <div class="text-truncate">
              <div class="stat-value text-dark">12+</div>
              <div class="stat-label text-muted">Appointments</div>
            </div>
          </div>

          <div class="stat-card flex-fill">
            <div class="stat-icon bg-danger bg-opacity-10 text-danger"><mat-icon>medical_services</mat-icon></div>
            <div class="text-truncate">
              <div class="stat-value text-dark">3+</div>
              <div class="stat-label text-muted">Surgeries</div>
            </div>
          </div>

          <div class="stat-card flex-fill">
            <div class="stat-icon bg-success bg-opacity-10 text-success"><mat-icon>meeting_room</mat-icon></div>
            <div class="text-truncate">
              <div class="stat-value text-dark">12+</div>
              <div class="stat-label text-muted">Room Visits</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Decorative elements -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
  </div>
</div>
