<mat-card class="glass-card h-100">
  <mat-card-header>
    <mat-card-title>Financial Overview</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="row g-4 ">
      @for (item of items; track item.label) {
        <div class="col-6">
          <div class="revenue-item p-3 rounded-4 border border-white border-opacity-10 shadow-sm"
            [ngClass]="item.color + '-light'">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <mat-icon [ngClass]="'text-' + item.color">{{item.icon}}</mat-icon>
              <span class="small fw-bold"
                [ngClass]="item.trend.startsWith('+') ? 'text-success' : 'text-danger'">{{item.trend}}</span>
            </div>
            <div class="h4 fw-bold mb-2">{{item.amount}}</div>
            <div class="small text-truncate">{{item.label}}</div>
          </div>
        </div>
      }
    </div>
  </mat-card-content>
</mat-card>
