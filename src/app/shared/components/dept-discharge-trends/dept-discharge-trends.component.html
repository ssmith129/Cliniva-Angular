<mat-card class="trend-card glass-card">
  <mat-card-header>
    <mat-card-title>Discharge Velocity</mat-card-title>
  </mat-card-header>
  <mat-card-content class="mt-2">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <div>
        <div class="display-5 fw-bold text-success">1,248</div>
        <div class="text-muted">+12% from last week</div>
      </div>
      <div class="chart-mini w-50">
        <apx-chart [series]="chartOptions.series!" [chart]="chartOptions.chart!" [stroke]="chartOptions.stroke!"
          [colors]="chartOptions.colors!" [tooltip]="chartOptions.tooltip!"></apx-chart>
      </div>
    </div>
    <div class="dept-summary pt-3 border-top border-white border-opacity-10">
      <div class="d-flex justify-content-between mb-1">
        <span>ICU Discharges</span>
        <span class="fw-bold">42</span>
      </div>
      <div class="d-flex justify-content-between">
        <span>General Ward</span>
        <span class="fw-bold">856</span>
      </div>
    </div>
  </mat-card-content>
</mat-card>
