<mat-card class="shift-card glass-card">
  <mat-card-header>
    <div class="header-container w-100 d-flex justify-content-between align-items-center">
      <mat-card-title>Staffing Snapshot</mat-card-title>
      <div class="live-indicator">
        <span class="dot"></span>
        <span class="text">Live</span>
      </div>
    </div>
  </mat-card-header>
  <mat-card-content>
    <div class="shift-list">
      <ng-scrollbar style="height: 280px" visibility="hover">
        @for (shift of shifts; track shift.name) {
          <div class="shift-item" [ngClass]="shift.status.toLowerCase()">
            <div class="shift-main">
              <div class="shift-icon-wrapper" [ngClass]="shift.color + '-gradient'">
                <mat-icon>access_time</mat-icon>
              </div>
              <div class="shift-info">
                <div class="shift-name">{{shift.name}}</div>
                <div class="shift-status-pill">{{shift.status}}</div>
              </div>
              <div class="shift-stats">
                <div class="count-val">{{shift.count}}</div>
                <div class="count-label">Staff</div>
              </div>
            </div>
            <div class="shift-progress-track">
              <div class="progress-fill" [ngClass]="shift.color + '-bg'" [style.width.%]="shift.count * 1.5"></div>
            </div>
          </div>
        }
      </ng-scrollbar>
    </div>
  </mat-card-content>
</mat-card>
