<div class="ai-assistant-container" cdkDrag cdkDragBoundary="body">
  <!-- Floating Trigger Button -->
  <button mat-fab class="ai-fab-button" (click)="toggleChat()" [matTooltip]="isOpen ? 'Close Assistant' : 'AI Assistant'"
    cdkDragHandle>
    @if (!isOpen) {
      <mat-icon>auto_awesome</mat-icon>
    }
    @if (isOpen) {
      <mat-icon>close</mat-icon>
    }
    @if (!isOpen) {
      <div class="glow-effect"></div>
    }
  </button>

  <!-- Chat Window -->
  @if (isOpen) {
    <div class="ai-chat-window" @slideInOut>
      <mat-card class="chat-card shadow-lg">
        <mat-card-header class="chat-header">
          <div class="header-content">
            <mat-icon class="header-icon">auto_awesome</mat-icon>
            <div class="title-group">
              <span class="chat-title">Cliniva AI</span>
              <span class="chat-status">Online & Ready</span>
            </div>
          </div>
          <button mat-icon-button (click)="toggleChat()" class="close-btn">
            <mat-icon>remove</mat-icon>
          </button>
        </mat-card-header>
        <mat-card-content class="chat-body">
          <ng-scrollbar class="chat-scroll">
            <div class="messages-container">
              @for (msg of messages; track msg) {
                <div class="message-wrapper" [ngClass]="msg.sender">
                  <!-- AI Avatar -->
                  @if (msg.sender === 'ai') {
                    <div class="avatar">
                      <img src="assets/images/logo.png" alt="Cliniva AI">
                    </div>
                  }
                  <div class="message-bubble">
                    {{ msg.text }}
                    <span class="message-time">{{ msg.time | date:'HH:mm' }}</span>
                  </div>
                </div>
              }
              <!-- Typing Indicator -->
              @if (isTyping) {
                <div class="message-wrapper ai">
                  <div class="avatar">
                    <img src="assets/images/logo.png" alt="Cliniva AI">
                  </div>
                  <div class="message-bubble typing">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                  </div>
                </div>
              }
            </div>
          </ng-scrollbar>
        </mat-card-content>
        <mat-card-actions class="chat-footer-container">
          <!-- Quick Actions Moved Here -->
          @if (messages.length < 3) {
            <div class="quick-actions">
              <button mat-stroked-button (click)="quickAction('Summarize today\'s stats')">📊 Summary</button>
              <button mat-stroked-button (click)="quickAction('Help with navigation')">❓ Help</button>
            </div>
          }
          <div class="input-area">
            <mat-form-field appearance="outline" class="input-field">
              <input matInput placeholder="Ask me anything..." [(ngModel)]="userInput" (keyup.enter)="sendMessage()">
              <button mat-icon-button matSuffix (click)="sendMessage()" [disabled]="!userInput.trim() || isTyping">
                <mat-icon color="primary">send</mat-icon>
              </button>
            </mat-form-field>
          </div>
        </mat-card-actions>
      </mat-card>
    </div>
  }
</div>
