<section class="content">
    <div class="content-block">
        <div class="block-header">
            <app-breadcrumb [title]="'Health Plans'" [items]="['Patient']"
                [active_item]="'Health Plans'"></app-breadcrumb>
        </div>
        <div class="row">
            <div class="col-12">
                @if (subscription) {
                <div class="subscription-card">
                    <div class="card-content">
                        <div class="plan-info">
                            <h5>Current Plan</h5>
                            <h2>{{subscription!.planName}}</h2>
                            <div class="status-badge">
                                <i class="fas fa-check-circle"></i> {{subscription!.status}}
                            </div>
                        </div>
                        <div class="plan-details">
                            <div class="validity">
                                <span>Valid Until</span>
                                <strong>{{subscription!.endDate}}</strong>
                            </div>
                            <button class="btn btn-renew">Renew Plan</button>
                        </div>
                    </div>
                </div>
                }
            </div>
        </div>
        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                <app-master-table [title]="'Available Plans'" [columnDefinitions]="columnDefinitions"
                    [dataSource]="dataSource" [isLoading]="isLoading" [exportFileName]="'health_plans'"
                    (add)="handleAdd()" (edit)="handleEdit($event)" (delete)="handleDelete($event)"
                    (refresh)="handleRefresh()" (bulkDelete)="handleBulkDelete($event)">
                </app-master-table>
            </div>
        </div>
    </div>
</section>
