<section class="content">
    <div class="content-block">
        <div class="block-header">
            <app-breadcrumb [title]="'Lifestyle & Wellness'" [items]="['Patient']"
                [active_item]="'Lifestyle'"></app-breadcrumb>
        </div>
        <div class="row">
            <div class="col-lg-4 col-md-6 mb-4">
                <div class="wellness-card diet" (click)="onExploreDiet()">
                    <i class="fas fa-utensils icon-bg"></i>
                    <div class="content">
                        <div class="icon-small">
                            <i class="fas fa-utensils"></i>
                        </div>
                        <h4>Diet Plans</h4>
                        <p>Personalized meal plans tailored to your health goals and dietary preferences.</p>
                        <button class="btn btn-explore">
                            Explore Plans <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 col-md-6 mb-4">
                <div class="wellness-card exercise" (click)="onStartExercise()">
                    <i class="fas fa-dumbbell icon-bg"></i>
                    <div class="content">
                        <div class="icon-small">
                            <i class="fas fa-dumbbell"></i>
                        </div>
                        <h4>Exercise Routines</h4>
                        <p>Custom workout schedules designed to boost your fitness and energy levels.</p>
                        <button class="btn btn-explore">
                            Start Training <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 col-md-6 mb-4">
                <div class="wellness-card mental" (click)="onFindPeace()">
                    <i class="fas fa-brain icon-bg"></i>
                    <div class="content">
                        <div class="icon-small">
                            <i class="fas fa-brain"></i>
                        </div>
                        <h4>Mental Health</h4>
                        <p>Guided meditation and stress management resources for a balanced mind.</p>
                        <button class="btn btn-explore">
                            Find Peace <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                <app-master-table [title]="'My Exercise Routines'" [columnDefinitions]="columnDefinitions"
                    [dataSource]="dataSource" [isLoading]="isLoading" [exportFileName]="'lifestyle_routines'"
                    (add)="handleAdd()" (edit)="handleEdit($event)" (delete)="handleDelete($event)"
                    (refresh)="handleRefresh()" (bulkDelete)="handleBulkDelete($event)">
                </app-master-table>
            </div>
        </div>
    </div>
</section>
