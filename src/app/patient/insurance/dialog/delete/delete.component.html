<div class="container">
    <h3 mat-dialog-title>Delete Insurance Claim</h3>
    <div mat-dialog-content>
        <p>Are you sure you want to delete the claim: <strong>{{data.claimId}}</strong>?</p>
    </div>
    <div mat-dialog-actions class="mb-1">
        <button mat-button (click)="onNoClick()" tabindex="-1">Cancel</button>
        <button mat-raised-button color="warn" [mat-dialog-close]="1" tabindex="2">Delete</button>
    </div>
</div>
