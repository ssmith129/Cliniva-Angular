<section class="content">
  <div class="content-block">
    <div class="block-header">
      <app-breadcrumb [title]="'Upcoming Appointments'" [items]="['Patient']"
        [active_item]="'Upcoming Appointments'"></app-breadcrumb>
    </div>
    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <app-master-table [title]="'Upcoming Appointments'" [columnDefinitions]="columnDefinitions"
          [dataSource]="dataSource" [isLoading]="isLoading" [exportFileName]="'upcoming_appointments'"
          (add)="handleAdd()" (edit)="handleEdit($event)" (delete)="handleDelete($event)" (refresh)="handleRefresh()"
          (bulkDelete)="handleBulkDelete($event)">
        </app-master-table>
      </div>
    </div>
  </div>
</section>
