<section class="content">
  <div class="content-block">
    <div class="block-header">
      <app-breadcrumb [title]="'Past Appointments'" [items]="['Patient']"
        [active_item]="'Past Appointments'"></app-breadcrumb>
    </div>
    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <app-master-table [title]="'Past Appointments'" [columnDefinitions]="columnDefinitions"
          [dataSource]="dataSource" [isLoading]="isLoading" [exportFileName]="'past_appointments'"
          (delete)="handleDelete($event)" (refresh)="handleRefresh()">
        </app-master-table>

      </div>
    </div>
  </div>
</section>
